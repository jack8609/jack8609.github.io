
<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>純前端 FFmpeg（本地檔，進階除錯版）</title>

  <!-- 同源 COI SW：放在 head 最前面 -->
  <script src="./coi-serviceworker.min.js"></script>
  <link rel="icon" href="data:," />

  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto; margin: 2rem; }
    h1 { margin-top: 0; }
    .log { white-space: pre-wrap; background:#111; color:#0f0; padding:1rem; min-height:12rem; }
    .controls { margin: 1rem 0; }
    button { margin-right: .5rem; }
    .status { margin:.5rem 0; }
    .small { font-size: 0.9rem; color: #555; }
    .error { color: #f66; }
    .ok { color: #6f6; }
  </style>
</head>
<body>
  <h1>純前端 FFmpeg（ffmpeg.wasm，本地檔｜整合除錯）</h1>

  <div class="controls">
    <input id="file" type="file" accept="video/*,audio/*" />
    <button id="btnTranscode" disabled>轉成 MP4</button>
    <button id="btnThumbnail" disabled>擷取縮圖</button>
  </div>

  <p class="status" id="status">狀態：初始化中…</p>
  <div class="log" id="log">Log：</div>
  <p id="out"></p>

  <script type="module">
    /***** 一些工具 *****/
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const outEl = document.getElementById('out');
    const fileInput = document.getElementById('file');
    const btnTranscode = document.getElementById('btnTranscode');
    const btnThumbnail = document.getElementById('btnThumbnail');

    const log = (...msgs) => {
      const ts = new Date().toISOString();
      logEl.textContent += `\n[${ts}] ${msgs.map(m => {
        try { return typeof m === 'string' ? m : JSON.stringify(m); }
        catch { return String(m); }
      }).join(' ')}`;
      logEl.scrollTop = logEl.scrollHeight;
      console.log(...msgs);
    };

    const errlog = (...msgs) => {
      log(...msgs.map(m => `ERROR: ${m}`));
      console.error(...msgs);
    };

    const fileToUint8Array = async (file) => new Uint8Array(await file.arrayBuffer());

    /***** 路徑：以 import.meta.url 產生含子目錄的絕對 URL  *****/
    const BASE = new URL('.', import.meta.url);

    // 👉 若你的核心檔實際在 /ffmpeg/，改成 './ffmpeg/ffmpeg-core.js/.wasm'
    const CORE_JS   = new URL('./core/ffmpeg-core.js', BASE).href;
    const CORE_WASM = new URL('./core/ffmpeg-core.wasm', BASE).href;
    const WORKER_JS = new URL('./ffmpeg/worker.js', BASE).href;

    /***** HEAD 檢查（狀態碼 & MIME） *****/
    const headCheck = async (url) => {
      try {
        const res = await fetch(url, { method: 'HEAD' });
        log(`HEAD ${url} -> status=${res.status} content-type=${res.headers.get('content-type')}`);
        return { ok: res.ok, status: res.status, ct: res.headers.get('content-type') };
      } catch (e) {
        errlog(`HEAD ${url} failed`, e?.message || e);
        return { ok: false, status: 0, ct: null, error: e };
      }
    };

    /***** 全域錯誤監聽（主線程） *****/
    window.addEventListener('error', (e) => {
      errlog('Main thread error:', e.message, e.filename, e.lineno, e.colno);
    });
    window.addEventListener('unhandledrejection', (e) => {
      errlog('Main thread unhandledrejection:', e.reason?.message || e.reason);
    });

    /***** 啟動流程 *****/
    const start = async () => {
      try {
        statusEl.textContent = '狀態：等待 Service Worker 就緒（首次載入可能會自動重載一次）…';

        log('location.href =', location.href);
        log('document.baseURI =', document.baseURI);
        log('BASE =', BASE.href);
        log('crossOriginIsolated =', String(self.crossOriginIsolated));

        // 等待 SW
        await navigator.serviceWorker.ready;
        log('Service Worker ready = true');

        // 資源檢查
        const h1 = await headCheck(CORE_JS);
        const h2 = await headCheck(CORE_WASM);
        const h3 = await headCheck(WORKER_JS);

        if (!h1.ok || !h2.ok || !h3.ok) {
          statusEl.textContent = '狀態：資源檢查失敗 ❌';
          errlog('Resource check failed:', { h1, h2, h3 });
          errlog('請確認路徑與目錄：core/ffmpeg-core.{js,wasm}、ffmpeg/worker.js 是否存在；且非 text/html。');
          return;
        }

        // 提示 MIME
        if (!/javascript|text\/javascript/.test(h1.ct || '')) {
          errlog('ffmpeg-core.js Content-Type 不符合（期望 application/javascript 或 text/javascript）：', h1.ct);
        }
        if (!/application\/wasm/.test(h2.ct || '')) {
          errlog('ffmpeg-core.wasm Content-Type 不符合（期望 application/wasm）：', h2.ct);
        }

        // 再檢查 core.js 是否可抓到內容
        try {
          const src = await (await fetch(CORE_JS, { cache: 'no-store' })).text();
          log('Fetched ffmpeg-core.js length =', src.length);
        } catch (e) {
          errlog('fetch ffmpeg-core.js failed:', e?.message || e);
        }

        statusEl.textContent = '狀態：正在載入 FFmpeg Core（首次載入會稍慢）…';

        // 匯入 FFmpeg ESM 入口（你本地的 index.js）
        let FFmpegCtor;
        try {
          const mod = await import('./ffmpeg/index.js');
          FFmpegCtor = mod.FFmpeg || mod.default;
          log('Loaded ./ffmpeg/index.js, FFmpegCtor =', !!FFmpegCtor);
        } catch (e) {
          statusEl.textContent = '狀態：載入 ESM 入口失敗 ❌';
          throw new Error(`無法 import ./ffmpeg/index.js：${e?.message || e}`);
        }

        const ffmpeg = new FFmpegCtor();

        // FFmpeg 事件
        if (ffmpeg?.on) {
          ffmpeg.on('log', ({ message }) => log('[ffmpeg log]', message));
          ffmpeg.on('progress', (p) => log('[ffmpeg progress]', JSON.stringify(p)));
        } else {
          log('FFmpeg instance 沒有 on()（事件）——可能是自訂封裝，忽略。');
        }

        // 嘗試載入核心（傳入絕對 URL）
        const opts = { coreURL: CORE_JS, wasmURL: CORE_WASM, workerURL: WORKER_JS };
        log('Calling ffmpeg.load with opts =', opts);

        // 量測時間
        const t0 = performance.now();
        try {
          await ffmpeg.load(opts);
        } catch (e) {
          const dt = (performance.now() - t0).toFixed(1);
          errlog(`ffmpeg.load() threw after ${dt} ms:`, e?.message || e);
          statusEl.textContent = `狀態：載入失敗 ❌ ${e?.message || e}`;
          log('Stack:', e?.stack || '(no stack)');
          log('可能原因：路徑錯誤、MIME 不符、Worker 類型不合（需 classic）、欄位名不一致。');
          return;
        }

        const dt = (performance.now() - t0).toFixed(1);
        log(`ffmpeg.load() success in ${dt} ms ✅`);
        statusEl.textContent = '狀態：FFmpeg Core 已載入完成 ✅';
        btnTranscode.disabled = false;
        btnThumbnail.disabled = false;

        /******** 按鈕功能 ********/
        btnTranscode.onclick = async () => {
          outEl.textContent = ""; log('開始轉檔…');
          const file = fileInput.files?.[0];
          if (!file) { alert("請先選一個影片/音訊檔"); return; }

          await ffmpeg.writeFile('input', await fileToUint8Array(file));
          await ffmpeg.exec(['-i', 'input', '-movflags', 'faststart', 'output.mp4']);

          const data = await ffmpeg.readFile('output.mp4');
          const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
          outEl.innerHTML = `<a href="${url}" download="output.mp4">下載 output.mp4</a>`;
          log('轉檔完成 ✅');
        };

        btnThumbnail.onclick = async () => {
          outEl.textContent = ""; log('擷取縮圖中…');
          const file = fileInput.files?.[0];
          if (!file) { alert("請先選一個影片檔"); return; }

          await ffmpeg.writeFile('in.mp4', await fileToUint8Array(file));
          await ffmpeg.exec(['-ss', '00:00:01', '-i', 'in.mp4', '-frames:v', '1', 'thumb.jpg']);

          const jpg = await ffmpeg.readFile('thumb.jpg');
          const url = URL.createObjectURL(new Blob([jpg.buffer], { type: 'image/jpeg' }));
          outEl.innerHTML = `<img src="${url}" alt="縮圖" />`;
          log('擷取完成 ✅');
        };

      } catch (err) {
        console.error(err);
        statusEl.textContent = `狀態：載入失敗 ❌ ${err?.message || err}`;
        errlog('Top-level catch:', err?.stack || err);
        alert('FFmpeg 初始化失敗。請嘗試硬重新載入（Windows/Linux：Ctrl+F5；macOS：Cmd+Shift+R）。');
      }
    };

    start();
  </script>

  <!-- Worker 偵錯建議：在你的 ./ffmpeg/worker.js 裡加上這些（供參考）
  self.addEventListener('error', (e) => {
    console.error('Worker top-level error:', e.message, e.filename, e.lineno, e.colno);
  });
  self.addEventListener('unhandledrejection', (e) => {
    console.error('Worker unhandledrejection:', e.reason);
  });
  // 載入核心：
  // try { importScripts(coreURL); } catch (e) { console.error('import ffmpeg-core.js failed:', e); throw e; }
  -->
</body>
</html>
