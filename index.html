
<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>純前端 FFmpeg（ffmpeg.wasm，本地檔）</title>

  <!-- ✅ 正確（同源）引入 coi-serviceworker；務必放在 head 很前面 -->
  <script src="./coi-serviceworker.min.js"></script>

  <!-- ✅ 避免 favicon 404 -->
  <link rel="icon" href="data:," />
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto; margin: 2rem; }
    h1 { margin-top: 0; }
    .log { white-space: pre-wrap; background:#111; color:#0f0; padding:1rem; min-height:8rem; }
    .controls { margin: 1rem 0; }
    button { margin-right: .5rem; }
    .status { margin:.5rem 0; }
  </style>
</head>
<body>
  <h1>純前端 FFmpeg（ffmpeg.wasm，本地檔）</h1>

  <div class="controls">
    <input id="file" type="file" accept="video/*,audio/*" />
    <button id="btnTranscode" disabled>轉成 MP4</button>
    <button id="btnThumbnail" disabled>擷取縮圖</button>
  </div>

  <p class="status" id="status">狀態：初始化中…</p>
  <div class="log" id="log">Log：</div>
  <p id="out"></p>

  <script type="module">
    // ✅ 以「本地檔」載入 ffmpeg 的 ESM 入口檔，避免 CDN 相對路徑把 worker.js 指到跨來源
    import { FFmpeg } from "./ffmpeg/index.js";

    // fetchFile 可用 CDN，不牽涉 Worker 載入與 COEP；也可改成本地 util
    import { fetchFile } from "https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.2/dist/esm/index.js";

    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const outEl = document.getElementById('out');
    const fileInput = document.getElementById('file');
    const btnTranscode = document.getElementById('btnTranscode');
    const btnThumbnail = document.getElementById('btnThumbnail');
    const log = (msg) => { logEl.textContent += `\n${msg}`; };

    const start = async () => {
      try {
        statusEl.textContent = '狀態：等待 Service Worker 就緒（首次載入可能會自動重載一次）…';
        // ✅ 等 SW ready，確保 COI 生效
        await navigator.serviceWorker.ready;

        log(`crossOriginIsolated=${self.crossOriginIsolated}`);

        const ffmpeg = new FFmpeg();
        ffmpeg.on('log', ({ message }) => log(message));

        statusEl.textContent = '狀態：正在載入 FFmpeg Core（首次載入會稍慢）…';

        // ✅ 使用同源自托管檔案（與 index.html 同站域）
        const coreURL   = './ffmpeg-core.js';
        const wasmURL   = './ffmpeg-core.wasm';
        const workerURL = './worker.js';

        await ffmpeg.load({ coreURL, wasmURL, workerURL });
        statusEl.textContent = '狀態：FFmpeg Core 已載入完成 ✅';
        btnTranscode.disabled = false;
        btnThumbnail.disabled = false;

        // --- 按鈕事件 ---
        btnTranscode.onclick = async () => {
          outEl.textContent = ""; log('開始轉檔…');
          const file = fileInput.files?.[0];
          if (!file) { alert("請先選一個影片/音訊檔"); return; }

          await ffmpeg.writeFile('input', await fetchFile(file));
          await ffmpeg.exec(['-i', 'input', '-movflags', 'faststart', 'output.mp4']);
          const data = await ffmpeg.readFile('output.mp4');
          const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
          outEl.innerHTML = `${url}下載 output.mp4</a>`;
          log('轉檔完成 ✅');
        };

        btnThumbnail.onclick = async () => {
          outEl.textContent = ""; log('擷取縮圖中…');
          const file = fileInput.files?.[0];
          if (!file) { alert("請先選一個影片檔"); return; }

          await ffmpeg.writeFile('in.mp4', await fetchFile(file));
          await ffmpeg.exec(['-ss', '00:00:01', '-i', 'in.mp4', '-frames:v', '1', 'thumb.jpg']);
          const jpg = await ffmpeg.readFile('thumb.jpg');
          const url = URL.createObjectURL(new Blob([jpg.buffer], { type: 'image/jpeg' }));
          outEl.innerHTML = `${url}`;
          log('擷取完成 ✅');
        };

      } catch (err) {
        console.error(err);
        statusEl.textContent = `狀態：載入失敗 ❌ ${err?.message || err}`;
        log(`Error: ${err?.stack || err}`);
        alert('FFmpeg 初始化失敗。請嘗試硬重新載入（Windows/Linux：Ctrl+F5；macOS：Cmd+Shift+R）。');
      }
    };

    start();
  </script>
</body>
</html>
