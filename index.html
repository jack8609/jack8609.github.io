<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>FFmpeg.wasm 2025 正確版</title>
    <script src="coi-serviceworker.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #log { background: #eee; padding: 10px; height: 100px; overflow: auto; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "preact": "https://unpkg.com/preact@10.25.4/dist/preact.module.js",
          "preact/hooks": "https://unpkg.com/preact@10.25.4/hooks/dist/hooks.module.js",
          "htm": "https://unpkg.com/htm@3.1.1/dist/htm.module.js"
        }
      }
    </script>
</head>
  <body>
    <script type="module">
      import { h, render } from "preact";
      import { useState } from "preact/hooks";
      import htm from "htm";

      const html = htm.bind(h);

      function App() {
        let [count, setCount] = useState(0);

        return html`
          <div>
            <p>Count: ${count}</p>
            <button onClick=${() => setCount(count + 1)}>Increment</button>
          </div>
        `;
      }

      render(html`<${App} />`, document.body);
    </script>
  </body>
</html>
