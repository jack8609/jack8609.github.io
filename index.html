<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>FFmpeg.wasm 2025 正確版</title>
    <!-- 引用本地檔案，不需要 https -->
    <script src="coi-serviceworker.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #log { background: #eee; padding: 10px; height: 100px; overflow: auto; }
    </style>
</head>
<body>
    <h2>FFmpeg.wasm 轉檔範例</h2>
    <input type="file" id="uploader">
    <button id="execBtn">開始轉檔</button>
    <div id="log"></div>

    <script type="module">
        // ✅ 修正點：必須加上 https://
        import { FFmpeg } from "unpkg.com";
        import { fetchFile, toBlobURL } from "unpkg.com";

        const ffmpeg = new FFmpeg();

        async function init() {
            // ✅ 修正點：必須加上 https://
            const baseURL = 'unpkg.com';
            
            ffmpeg.on('log', ({ message }) => {
                document.getElementById('log').innerText = message;
            });

            await ffmpeg.load({
                coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
            });
            console.log("FFmpeg 載入完成");
        }

        document.getElementById('execBtn').addEventListener('click', async () => {
            const files = document.getElementById('uploader').files;
            if (files.length === 0) return;

            await ffmpeg.writeFile('input.mp4', await fetchFile(files[0]));
            // 執行簡單剪輯與轉檔
            await ffmpeg.exec(['-i', 'input.mp4', '-t', '5', 'output.mp4']);
            const data = await ffmpeg.readFile('output.mp4');
            
            const video = document.createElement('video');
            video.src = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
            video.controls = true;
            document.body.appendChild(video);
        });

        init();
    </script>
</body>
</html>
