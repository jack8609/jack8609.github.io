<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>前端預覽＋快速剪輯／轉檔／擷取縮圖｜FFmpeg.wasm 本地檔</title>

  <!-- ✅ COI Service Worker（需同源 HTTP 伺服器；不可 file://） -->
  <script src="./coi-serviceworker.min.js"></script>

  <!-- 避免 favicon 404 -->
  <link rel="icon" href="data:," />

  <style>
    :root {
      --bg: #0e0f12;
      --fg: #e6e6e6;
      --accent: #35a0ff;
      --ok: #39d353;
      --err: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: var(--fg); font-family: system-ui, -apple-system, "Segoe UI", Roboto; margin: 2rem; }
    h1 { margin-top: 0; }
    .panel { background: #16181d; border: 1px solid #262a33; border-radius: 10px; padding: 1rem; }
    .controls { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
    .log { white-space: pre-wrap; background:#0a0a0a; color:#86ff91; padding:1rem; min-height:10rem; border-radius: 8px; font-size: 0.92rem; }
    button { padding: .55rem .85rem; border-radius: 8px; border: 1px solid #2a2f3a; background: #1d2129; color: var(--fg); cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button.primary { border-color: var(--accent); color: #fff; background: #0c3a60; }
    .status { margin:.5rem 0; }
    input[type="range"] { width: 520px; }
    .time { font-variant-numeric: tabular-nums; }
    .chip { background: #0f2338; color: #bfe3ff; border: 1px solid #1f3d5e; padding: .2rem .5rem; border-radius: 6px; }
    a { color: #8fbfff; }
    .hint { color: #9aa5b1; font-size: .9rem; }
    .col { display: grid; grid-template-columns: 1fr; gap: 1rem; }
    @media (min-width: 980px) { .col { grid-template-columns: 1.2fr 1fr; } }
    .group-title { margin: .5rem 0 .25rem; font-weight: 600; color: #c9d1d9; }
    /* Log 折疊控制 */
    .log-panel { display: none; }
    .log-panel.show { display: block; }
    .toggle-row { display: flex; align-items: center; gap: .5rem; margin-top: .75rem; }
    .toggle-row label { user-select: none; }
  </style>
</head>
<body>
  <h1>前端預覽＋快速剪輯／轉檔／擷取縮圖</h1>

  <!-- 檔案選擇與狀態 -->
  <div class="panel">
    <div class="controls">
      <!-- ✅ 明確支援 .ts，避免只能選「所有檔案」 -->
      <input id="file" type="file" accept="video/*,audio/*,.ts" />
      <span id="fileInfo" class="hint">請選擇影片或音訊檔（支援 .mp4 / .ts / .mov / .mp3 等）</span>
    </div>
    <p class="status" id="status">狀態：初始化中…</p>
  </div>

  <!-- 單一整合區塊：預覽 + 三個功能 -->
  <div class="panel">
    <div class="col">
      <!-- 左側：預覽與定位 -->
      <div>
        <h3>預覽</h3>
        <video id="preview" controls playsinline style="max-width:100%; width:520px; background:#000; border-radius: 8px;"></video>
        <div class="controls" style="margin-top:.75rem;">
          <input id="seek" type="range" min="0" max="0" step="0.01" value="0" />
          <span class="time"><span id="cur">00:00:00.00</span> / <span id="dur">00:00:00.00</span></span>
        </div>
        <div class="controls">
          <button id="setStart">設定開始（取目前時間）</button>
          <button id="setEnd">設定結束（取目前時間）</button>
          <button id="btnReset">重設開始/結束</button>
          <span class="chip">開始：<span id="startLabel">未設定</span></span>
          <span class="chip">結束：<span id="endLabel">未設定</span></span>
        </div>
        <p class="hint">提示：無轉碼剪輯（<code>-c copy</code>）速度最快，但裁切點以「關鍵幀」為準，可能略有偏差；若需要毫秒級精準，請改用重編碼（會較慢）。</p>
      </div>

      <!-- 右側：三種輸出功能（整合於同一區塊） -->
      <div>
        <h3>輸出功能</h3>

        <div class="group-title">快速剪輯（不重編碼）</div>
        <div class="controls">
          <button id="btnClip" class="primary" disabled>剪輯並輸出</button>
        </div>

        <div class="group-title">轉檔（MP4）</div>
        <div class="controls">
          <button id="btnTranscode" disabled>轉成 MP4</button>
        </div>

        <div class="group-title">擷取縮圖（使用目前預覽時間點）</div>
        <div class="controls">
          <button id="btnThumbnail" disabled>擷取縮圖</button>
        </div>

        <p id="out" class="hint"></p>

        <!-- 顯示 Log 的勾選 -->
        <div class="toggle-row">
          <input type="checkbox" id="toggleLog" />
          <label for="toggleLog">顯示 Log</label>
        </div>
      </div>
    </div>
  </div>

  <!-- Log（預設隱藏；勾選顯示） -->
  <div id="logPanel" class="panel log-panel">
    <h3>Log</h3>
    <div class="log" id="log">Log：</div>
  </div>

  <script type="module">
    /********** UI 工具 **********/
    const statusEl = document.getElementById('status');
    const logEl    = document.getElementById('log');
    const logPanel = document.getElementById('logPanel');
    const toggleLog= document.getElementById('toggleLog');

    const fileInput = document.getElementById('file');
    const fileInfo  = document.getElementById('fileInfo');
    const preview   = document.getElementById('preview');
    const seek      = document.getElementById('seek');
    const curEl     = document.getElementById('cur');
    const durEl     = document.getElementById('dur');
    const setStartBtn = document.getElementById('setStart');
    const setEndBtn   = document.getElementById('setEnd');
    const startLabel  = document.getElementById('startLabel');
    const endLabel    = document.getElementById('endLabel');
    const btnClip     = document.getElementById('btnClip');
    const btnReset    = document.getElementById('btnReset');
    const btnTranscode= document.getElementById('btnTranscode');
    const btnThumbnail= document.getElementById('btnThumbnail');
    const outEl       = document.getElementById('out');

    // Log 顯示控制：預設隱藏；勾選才顯示
    toggleLog.addEventListener('change', () => {
      if (toggleLog.checked) logPanel.classList.add('show');
      else logPanel.classList.remove('show');
    });

    const log = (...msgs) => {
      const ts = new Date().toISOString();
      const s = msgs.map(m => {
        if (typeof m === 'string') return m;
        try { return JSON.stringify(m); } catch { return String(m); }
      }).join(' ');
      logEl.textContent += `\n[${ts}] ${s}`;
      logEl.scrollTop = logEl.scrollHeight;
      console.log(...msgs);
    };
    const errlog = (...msgs) => { log('ERROR:', ...msgs); console.error(...msgs); };
    const fmt = (t) => {
      if (!isFinite(t)) return '00:00:00.00';
      const h = Math.floor(t / 3600);
      const m = Math.floor((t % 3600) / 60);
      const s = t % 60;
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${s.toFixed(2).padStart(5,'0')}`;
    };

    /********** FFmpeg 本地載入（classic worker + wasmBinary） **********/
    const BASE = new URL('.', import.meta.url);
    const CORE_JS   = new URL('./core/ffmpeg-core.js', BASE).href;
    const CORE_WASM = new URL('./core/ffmpeg-core.wasm', BASE).href;
    const WORKER_JS = new URL('./ffmpeg/worker.js', BASE).href;

    const fileToUint8Array = async (file) => new Uint8Array(await file.arrayBuffer());

    // 匯入你本地的 FFmpeg ESM 入口
    let FFmpegCtor;
    let ffmpeg;
    try {
      const mod = await import('./ffmpeg/index.js');
      FFmpegCtor = mod.FFmpeg || mod.default;
    } catch (e) {
      statusEl.textContent = '狀態：載入 FFmpeg 入口失敗 ❌';
      errlog('無法 import ./ffmpeg/index.js：', e?.message || e);
    }

    const startFFmpeg = async () => {
      try {
        statusEl.textContent = '狀態：等待 Service Worker 就緒…';
        await navigator.serviceWorker.ready;
        log('crossOriginIsolated =', String(self.crossOriginIsolated));

        ffmpeg = new FFmpegCtor();
        if (ffmpeg?.on) {
          ffmpeg.on('log', ({ message }) => log('[ffmpeg]', message));
          ffmpeg.on('progress', (p) => log('[progress]', JSON.stringify(p)));
        }

        statusEl.textContent = '狀態：正在載入 FFmpeg Core…（首次載入較慢）';
        const t0 = performance.now();
        await ffmpeg.load({ coreURL: CORE_JS, wasmURL: CORE_WASM, workerURL: WORKER_JS });
        const dt = (performance.now() - t0).toFixed(1);
        statusEl.textContent = `狀態：FFmpeg Core 已載入完成 ✅（${dt} ms）`;
        log('FFmpeg 已就緒。');

        setActionsEnabled(false);
      } catch (err) {
        statusEl.textContent = `狀態：載入失敗 ❌ ${err?.message || err}`;
        errlog('初始化失敗：', err?.stack || err);
      }
    };

    await startFFmpeg();

    /********** 狀態：原始檔 / 可播放檔（TS 會轉成 MP4） **********/
    let selectedFileRaw = null;  // 使用者上傳的原始檔（File）
    let playableBlob    = null;  // 可供預覽與後續操作的 Blob（若為 TS，則為自動轉檔後 MP4）
    let playableName    = '';    // 對應 ffmpeg FS 的輸入檔名（通常 'input.mp4'）
    let autoMp4Url      = '';    // 若 TS 自動轉檔，這是供下載的 MP4 連結（ObjectURL）

    const resetMarks = () => {
      startTime = NaN;
      endTime = NaN;
      startLabel.textContent = '未設定';
      endLabel.textContent = '未設定';
      outEl.innerHTML = '';
    };
    function setActionsEnabled(enabled) {
      btnClip.disabled = !enabled;
      btnTranscode.disabled = !enabled;
      btnThumbnail.disabled = !enabled;
    }

    /********** 檔案變更（不自動播放；TS 自動重封裝成 MP4 作為預覽） **********/
    fileInput.onchange = async () => {
      const file = fileInput.files?.[0];
      if (!file) {
        selectedFileRaw = null;
        playableBlob = null;
        playableName = '';
        setActionsEnabled(false);
        preview.removeAttribute('src');
        preview.load();
        fileInfo.textContent = '請選擇影片或音訊檔（支援 .mp4 / .ts / .mov / .mp3 等）';
        return;
      }

      selectedFileRaw = file;
      resetMarks();

      const lower = (file.name || '').toLowerCase();
      const isTS = lower.endsWith('.ts');

      try {
        if (isTS) {
          // 🔁 先將 TS 快速重封裝成 MP4（不轉碼），並用此 MP4 作預覽與後續操作
          const inName = 'input.ts';
          const outName = 'automp4.mp4';

          await ffmpeg.writeFile(inName, await fileToUint8Array(file));
          const args = ['-i', inName, '-c', 'copy', '-bsf:a', 'aac_adtstoasc', outName];
          log('TS 自動重封裝為 MP4…', args);
          await ffmpeg.exec(args);

          const data = await ffmpeg.readFile(outName);
          playableBlob = new Blob([data.buffer], { type: 'video/mp4' });
          playableName = 'input.mp4'; // 後續操作一律使用 MP4 作為輸入
          autoMp4Url   = URL.createObjectURL(playableBlob);

          // ✅ 不自動播放：只載入預覽來源
          preview.src = autoMp4Url;
          preview.load(); // 保持暫停

          // 顯示檔案資訊與下載連結
          fileInfo.textContent = `已選擇：${file.name}（${(file.size/1024/1024).toFixed(2)} MB）｜已自動轉為 MP4 預覽`;
          outEl.innerHTML = `<a href="${autoMp4Url}" download="converted.mp4">下載自動轉檔 MP4</a>`;
          setActionsEnabled(true);
        } else {
          // 非 TS：直接以原始檔作為 playable
          playableBlob = file;               // File 亦可作為 Blob 使用
          playableName = inferInputName(file.name);
          autoMp4Url   = '';

          const url = URL.createObjectURL(file);
          preview.src = url;
          preview.load(); // ✅ 不自動播放

          fileInfo.textContent = `已選擇：${file.name}（${(file.size/1024/1024).toFixed(2)} MB）`;
          outEl.textContent = '';
          setActionsEnabled(true);
        }
      } catch (e) {
        errlog('載入/轉檔失敗：', e?.message || e);
        alert('載入或自動轉檔失敗：' + (e?.message || e));
        setActionsEnabled(false);
      }
    };

    /********** 預覽與進度條 **********/
    let startTime = NaN;
    let endTime   = NaN;

    preview.addEventListener('loadedmetadata', () => {
      const dur = preview.duration;
      seek.max = isFinite(dur) ? dur : 0;
      durEl.textContent = fmt(dur);
      // 初始化「目前時間」顯示
      curEl.textContent = fmt(preview.currentTime || 0);
    });

    preview.addEventListener('timeupdate', () => {
      const t = preview.currentTime;
      curEl.textContent = fmt(t);
      if (Math.abs(seek.value - t) > 0.05) seek.value = t;
    });

    seek.addEventListener('input', () => {
      const v = parseFloat(seek.value);
      if (isFinite(v)) preview.currentTime = v;
    });

    setStartBtn.onclick = () => {
      const t = preview.currentTime;
      startTime = t;
      startLabel.textContent = `${fmt(t)}（${t.toFixed(2)}s）`;
    };
    setEndBtn.onclick = () => {
      const t = preview.currentTime;
      endTime = t;
      endLabel.textContent = `${fmt(t)}（${t.toFixed(2)}s）`;
    };
    btnReset.onclick = () => {
      startTime = NaN; endTime = NaN;
      startLabel.textContent = '未設定';
      endLabel.textContent = '未設定';
    };

    /********** 輔助：推斷輸入檔名（容器名）**********/
    function inferInputName(name) {
      const lower = (name || '').toLowerCase();
      if (lower.endsWith('.mp4')) return 'input.mp4';
      if (lower.endsWith('.ts'))  return 'input.ts';
      if (lower.endsWith('.mov')) return 'input.mov';
      if (lower.endsWith('.mkv')) return 'input.mkv';
      if (lower.endsWith('.mp3')) return 'input.mp3';
      return 'input.mp4';
    }

    /********** 功能 1：快速剪輯（不重編碼，-c copy）**********/
    btnClip.onclick = async () => {
      try {
        outEl.textContent = '';
        if (!playableBlob) { alert('請先選擇檔案'); return; }
        if (!isFinite(startTime) || !isFinite(endTime)) { alert('請先設定開始與結束時間'); return; }
        if (endTime <= startTime) { alert('結束時間必須大於開始時間'); return; }

        const inName = playableName || 'input.mp4';
        const outName = 'clip.mp4';

        log('開始快速剪輯（無轉碼）…', { startTime, endTime, inName, outName });
        await ffmpeg.writeFile(inName, await fileToUint8Array(playableBlob));

        const ss = startTime.toFixed(2);
        const to = endTime.toFixed(2);
        await ffmpeg.exec(['-i', inName, '-ss', ss, '-to', to, '-c', 'copy', outName]);

        const data = await ffmpeg.readFile(outName);
        const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
        outEl.innerHTML = `<a href="${url}" download="clip.mp4">下載剪輯檔案（${ss}s → ${to}s）</a>`;
        log('剪輯完成 ✅');

      } catch (e) {
        errlog('快速剪輯失敗：', e?.message || e);
        alert('剪輯失敗：' + (e?.message || e));
      }
    };

    /********** 功能 2：轉檔（MP4）**********/
    btnTranscode.onclick = async () => {
      try {
        outEl.textContent = '';
        // 若已是 TS 且自動轉檔完成，這個按鈕可視為「重新轉檔／再次下載」
        const file = selectedFileRaw;
        if (!file) { alert("請先選擇檔案"); return; }

        const lower = (file.name || '').toLowerCase();
        const isTS = lower.endsWith('.ts');

        if (isTS) {
          // 直接提供（或重新生成）自動轉檔後的 MP4
          if (autoMp4Url) {
            outEl.innerHTML = `<a href="${autoMp4Url}" download="converted.mp4">下載自動轉檔 MP4</a>`;
            log('TS 已自動轉檔完成，提供下載連結（converted.mp4）');
            return;
          }
          // 若沒有（例如被釋放），就再跑一次
          const inName = 'input.ts';
          const outName = 'automp4.mp4';
          await ffmpeg.writeFile(inName, await fileToUint8Array(file));
          await ffmpeg.exec(['-i', inName, '-c', 'copy', '-bsf:a', 'aac_adtstoasc', outName]);
          const data = await ffmpeg.readFile(outName);
          const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
          autoMp4Url = url;
          outEl.innerHTML = `<a href="${url}" download="converted.mp4">下載自動轉檔 MP4</a>`;
          log('TS 重新自動轉檔完成 ✅');
        } else {
          // 非 TS：照原本流程（可能重編碼，較慢）
          const inName = inferInputName(file.name);
          await ffmpeg.writeFile(inName, await fileToUint8Array(file));
          await ffmpeg.exec(['-i', inName, '-movflags', 'faststart', 'output.mp4']);
          const data = await ffmpeg.readFile('output.mp4');
          const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
          outEl.innerHTML = `<a href="${url}" download="output.mp4">下載 output.mp4</a>`;
          log('轉檔完成 ✅');
        }
      } catch (e) {
        errlog('轉檔失敗：', e?.message || e);
        alert('轉檔失敗：' + (e?.message || e));
      }
    };

    /********** 功能 3：擷取縮圖（使用目前預覽時間點）**********/
    btnThumbnail.onclick = async () => {
      try {
        outEl.textContent = '';
        if (!playableBlob) { alert("請先選擇影片檔"); return; }

        const inName = playableName || 'input.mp4';
        await ffmpeg.writeFile(inName, await fileToUint8Array(playableBlob));

        const t = preview.currentTime;
        const ss = isFinite(t) ? t.toFixed(2) : '0';
        log('擷取縮圖（當下時間）…', { currentTime: ss, inName });

        await ffmpeg.exec(['-ss', ss, '-i', inName, '-frames:v', '1', 'thumb.jpg']);

        const jpg = await ffmpeg.readFile('thumb.jpg');
        const url = URL.createObjectURL(new Blob([jpg.buffer], { type: 'image/jpeg' }));
        outEl.innerHTML = `<a href="${url}" download="thumb.jpg">下載縮圖（${ss}s）</a><br><img src="${url}" alt="縮圖" style="max-width:260px;margin-top:.5rem;border-radius:6px;" />`;
        log('擷取完成 ✅');
      } catch (e) {
        errlog('擷取縮圖失敗：', e?.message || e);
        alert('擷取縮圖失敗：' + (e?.message || e));
      }
    };
  </script>
</body>
</html>
